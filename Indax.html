<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zzzzzz — Developer & Gamer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d0d12;
    --card-bg: #141420;
    --card2-bg: #1a1a2e;
    --accent1: #b06ef3;
    --accent2: #6ec6f5;
    --accent3: #f06292;
    --text: #e8e8f0;
    --sub: #9090b0;
    --online: #3ba55c;
    --dnd: #ed4245;
  }

  body {
    background: var(--bg);
    font-family: 'Kanit', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(176,110,243,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 70%, rgba(110,198,245,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(240,98,146,0.08) 0%, transparent 70%);
    pointer-events: none;
    animation: bgPulse 8s ease-in-out infinite alternate;
  }

  @keyframes bgPulse {
    from { opacity: 0.7; }
    to { opacity: 1; }
  }

  .wrapper {
    width: 100%;
    max-width: 400px;
    padding: 20px;
    position: relative;
    z-index: 1;
  }

  /* Outer profile card */
  .profile-outer {
    background: linear-gradient(145deg, #1c1c2e, #141428);
    border: 1px solid rgba(176,110,243,0.25);
    border-radius: 24px;
    padding: 32px 24px 24px;
    box-shadow:
      0 0 60px rgba(176,110,243,0.15),
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
    overflow: hidden;
  }

  .profile-outer::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(176,110,243,0.15), transparent 70%);
    pointer-events: none;
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 1px;
    background: var(--accent2);
    transform: rotate(45deg);
    animation: sparklePop 3s ease-in-out infinite;
  }
  .sparkle:nth-child(1) { top: 18%; left: 8%; animation-delay: 0s; }
  .sparkle:nth-child(2) { top: 22%; right: 10%; animation-delay: 1.2s; background: var(--accent1); }
  .sparkle:nth-child(3) { top: 60%; right: 6%; animation-delay: 0.6s; width: 4px; height: 4px; }

  @keyframes sparklePop {
    0%, 100% { opacity: 0.2; transform: rotate(45deg) scale(0.8); }
    50% { opacity: 1; transform: rotate(45deg) scale(1.3); }
  }

  /* Avatar */
  .avatar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 16px;
    position: relative;
  }

  .avatar-ring {
    width: 104px; height: 104px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--accent2), var(--accent1), var(--accent3), var(--accent2));
    background-size: 300% 300%;
    animation: ringRotate 4s linear infinite;
    position: relative;
  }

  @keyframes ringRotate {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .avatar-img {
    width: 100%; height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--card-bg);
    background: #222;
  }

  .status-dot {
    position: absolute;
    bottom: 4px; right: 4px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--online);
    border: 3px solid var(--card-bg);
    box-shadow: 0 0 8px var(--online);
  }

  /* Name */
  .display-name {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(176,110,243,0.5);
    margin-bottom: 6px;
    font-family: 'Fira Code', monospace;
  }

  .bio {
    text-align: center;
    color: var(--sub);
    font-size: 0.85rem;
    letter-spacing: 1px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .bio::before, .bio::after {
    content: '—';
    opacity: 0.4;
  }

  /* Inner Discord-style card */
  .discord-card {
    background: #111118;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .dc-banner {
    height: 64px;
    background: linear-gradient(135deg, #5865F2, #8b5cf6, #a855f7);
    position: relative;
  }

  .dc-body {
    padding: 0 16px 16px;
    position: relative;
  }

  .dc-avatar-wrap {
    position: relative;
    display: inline-block;
    margin-top: -30px;
    margin-bottom: 8px;
  }

  .dc-avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #111118;
    background: #222;
  }

  .dc-status {
    position: absolute;
    bottom: 2px; right: 2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--dnd);
    border: 3px solid #111118;
  }

  .dc-icons {
    position: absolute;
    top: 12px; right: 12px;
    display: flex;
    gap: 6px;
  }

  .dc-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .dc-username {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 2px;
  }

  .dc-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    font-family: 'Fira Code', monospace;
  }

  .dnd-badge {
    background: var(--dnd);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .dc-handle {
    color: var(--sub);
    font-size: 0.8rem;
    margin-bottom: 14px;
    font-family: 'Fira Code', monospace;
  }

  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 12px;
  }

  .activity-label {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--sub);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .activity-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .activity-icon {
    width: 50px; height: 50px;
    border-radius: 10px;
    background: #1a2a3a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .activity-info .act-name {
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
  }
  .activity-info .act-state,
  .activity-info .act-time {
    font-size: 0.75rem;
    color: var(--sub);
  }

  /* Social buttons */
  .socials {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .soc-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 18px;
    text-decoration: none;
    color: var(--sub);
  }

  .soc-btn:hover {
    background: rgba(176,110,243,0.2);
    border-color: var(--accent1);
    color: var(--accent1);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(176,110,243,0.3);
  }

  /* Views */
  .views-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .views-badge {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 14px;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 0.8rem;
    color: var(--sub);
  }

  .eye-icon { color: #f06292; font-size: 14px; }

  /* Music Player */
  .music-player {
    margin-top: 16px;
    background: #0e0e1a;
    border: 1px solid rgba(176,110,243,0.2);
    border-radius: 20px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .music-thumb {
    width: 50px; height: 50px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.1);
    background: #222;
  }

  .music-info {
    flex: 1;
    min-width: 0;
  }

  .music-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .music-artist {
    font-size: 0.75rem;
    color: var(--sub);
    margin-bottom: 6px;
  }

  .progress-bar {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent1), var(--accent2));
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
  }

  .music-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--sub);
    font-size: 16px;
    padding: 4px;
    transition: color 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
  }

  .ctrl-btn:hover { color: #fff; }

  .play-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #111;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(255,255,255,0.2);
  }

  .play-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 20px rgba(176,110,243,0.4);
  }

  .play-btn:active { transform: scale(0.95); }

  /* Time display */
  .time-display {
    font-size: 0.65rem;
    color: var(--sub);
    font-family: 'Fira Code', monospace;
    text-align: right;
    margin-top: 3px;
  }

  /* Loading spinner for avatar */
  .avatar-fallback {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e, #2a1a3e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    border: 3px solid var(--card-bg);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .profile-outer { animation: fadeInUp 0.6s ease both; }
  .music-player { animation: fadeInUp 0.6s 0.2s ease both; }
</style>
</head>

<script>
const audio = document.getElementById('audioPlayer');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const progressFill = document.getElementById('progressFill');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');

const PLAY_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
const PAUSE_SVG = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>`;

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

audio.addEventListener('loadedmetadata', () => {
  totalTimeEl.textContent = formatTime(audio.duration);
});

audio.addEventListener('timeupdate', () => {
  if (audio.duration) {
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    currentTimeEl.textContent = formatTime(audio.currentTime);
  }
});

audio.addEventListener('ended', () => {
  playBtn.innerHTML = PLAY_SVG;
  progressFill.style.width = '0%';
  currentTimeEl.textContent = '0:00';
});

function togglePlay() {
  if (audio.paused) {
    audio.play();
    playBtn.innerHTML = PAUSE_SVG;
  } else {
    audio.pause();
    playBtn.innerHTML = PLAY_SVG;
  }
}

function seekAudio(e) {
  const bar = document.getElementById('progressBar');
  const rect = bar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (audio.duration) audio.currentTime = pct * audio.duration;
}

function skipBack() { audio.currentTime = Math.max(0, audio.currentTime - 10); }
function skipForward() { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); }

// Elapsed time counter for activity
let startTime = Date.now();
function updateElapsed() {
  const d = Math.floor((Date.now() - startTime) / 1000);
  const h = Math.floor(d / 3600);
  const m = Math.floor((d % 3600) / 60);
  const s = d % 60;
  let str = h > 0 ? `${h}:` : '';
  str += `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')} elapsed`;
  document.getElementById('elapsed').textContent = str;
}
setInterval(updateElapsed, 1000);

// Increment views randomly
setTimeout(() => {
  const vc = document.getElementById('viewCount');
  vc.textContent = parseInt(vc.textContent) + 1;
}, Math.random() * 20000 + 5000);
</script>
</body>
